# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - iplpredictionmania

on:
  push:
    branches:
      - master
      - main
      - user/ashishkarn/addFirebaseStore
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package/server
          # Copy built frontend
          cp -r dist deploy-package/
          # Copy server files
          cp server.js deploy-package/
          cp server/cricket-data-service.js deploy-package/server/
          cp server/match-scheduler.js deploy-package/server/
          # Copy package files
          cp package.json deploy-package/
          cp package-lock.json deploy-package/ 2>/dev/null || true
          # Install production dependencies only
          cd deploy-package
          npm ci --omit=dev

      - name: Zip artifact for deployment
        run: |
          cd deploy-package
          zip -r ../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D64EC6E845AE425FB20E0E4475C85C43 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_36E3AA6ABF3448D3B3F314A0CEB1DBA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_210719E2EA7546888C514A7335A0BD88 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'iplpredictionmania'
          slot-name: 'Production'
          package: .
          